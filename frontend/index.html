<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Inventory Manager</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📦</text></svg>">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
    <script>
        const theme = localStorage.getItem("theme") || "light";
        document.documentElement.setAttribute("data-bs-theme", theme);
        
        if (!localStorage.getItem("token")) {
            window.location.replace("login.html");
        }
    </script>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg glass-nav shadow-sm sticky-top py-3" data-bs-theme="dark">
        <div class="container">
            <a class="navbar-brand brand-title" href="index.html">📦 Inventory Manager</a>
            
            <!-- Hamburger Menu for Mobile -->
            <button class="navbar-toggler shadow-none border-0 bg-light bg-opacity-10" type="button" data-bs-toggle="collapse" data-bs-target="#dashboardNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="dashboardNav">
                <!-- Navigation Links -->
                <ul class="navbar-nav ms-lg-5 me-auto fw-medium gap-lg-3 mt-3 mt-lg-0 text-center">
                    <li class="nav-item"><a class="nav-link custom-nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link custom-nav-link" href="contact.html">Contact</a></li>
                    <li class="nav-item d-none" id="adminUsersLink"><a class="nav-link custom-nav-link" href="admin.html"><i class="bi bi-people-fill"></i> Users</a></li>
                </ul>

                <!-- Action Buttons -->
                <div class="d-flex align-items-center justify-content-center gap-2 mt-4 mt-lg-0 pb-3 pb-lg-0">
                    <a href="https://github.com/GitbyShantanu/Inventory-Management-System" target="_blank" class="nav-icon-btn" title="View Source Code">
                        <i class="bi bi-github fs-5"></i> 
                    </a>
                    <button id="themeToggle" class="nav-icon-btn border-0" title="Toggle Theme">
                        <i id="themeIcon" class="bi bi-moon-fill fs-5"></i>
                    </button>
                    
                    <!-- Profile Button -->
                    <button id="profileBtn" class="nav-icon-btn border-0" title="My Profile">
                        <i class="bi bi-person-circle fs-5"></i>
                    </button>

                    <!-- Logout Button -->
                    <button id="logoutBtn" class="btn btn-danger bg-opacity-75 border-0 rounded-pill px-4 ms-2 fw-bold hover-lift d-flex align-items-center">
                        <i class="bi bi-box-arrow-right me-2"></i> Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container py-3">
        <div class="row mt-4">

            <!-- FORM -->
            <div class="col-md-3" id="formColumn">
                <div class="card p-3">
                    
                    <!-- Mobile Toggle Header (Only visible on phones) -->
                    <div class="d-flex justify-content-between align-items-center d-md-none" data-bs-toggle="collapse" data-bs-target="#productFormCollapse" style="cursor: pointer;">
                        <h5 class="mb-0">Add Product</h5>
                        <i class="bi bi-chevron-down text-muted"></i>
                    </div>
                    
                    <!-- Desktop Header (Only visible on laptops/tablets) -->
                    <h5 class="mb-3 d-none d-md-block">Add Product</h5>

                    <div class="collapse d-md-block mt-3 mt-md-0" id="productFormCollapse">
                        <form id="productForm" autocomplete="off">

                        <input type="hidden" id="productId">  <!--this productId field is not used in update modal but is required to reset the form after submission. It is not used to store the id of the product being edited, as that is handled separately in the modal's hidden field (idField). -->
                        
                        <div class="mb-3">
                            <label class="form-label">Product Name: <span class="text-danger">*</span></label>
                            <input type="text" id="productName" class="form-control" placeholder="Product name"
                            required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Description: <span class="text-muted fw-normal small">(Optional)</span></label>
                            <input type="text" id="description" class="form-control" placeholder="Product description">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Price: <span class="text-danger">*</span></label>
                            <input type="number" id="price" class="form-control" min="0.01" step="0.01" placeholder="Price" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Quantity: <span class="text-danger">*</span></label>
                            <input type="number" id="qty" class="form-control" min="0" placeholder="Quantity" required>
                        </div>

                        <button type="submit" class="btn btn-success w-100" id="submit">Save</button>
                        <input type="reset" class="btn btn-secondary w-100 mt-2" value="Reset" onclick="clearForm()">
                    </form>
                    </div>
                </div>
            </div>

            <!-- TABLE -->
            <div class="col-md-9 mt-4 mt-md-0" id="tableColumn">
                <div class="card p-3">
                    <h5>Product List</h5>

                    <input type="text" id="searchInput" class="form-control mb-2" 
                        placeholder="Search product by id, name, description or price...">

                    <div class="table-container overflow-auto" style="max-height: 345px;">
                    <table class="table table-hover mt-2 align-middle">
                            <thead class="table-dark position-sticky top-0" style="z-index: 1;">
                                <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Description</th>
                                <th>Price</th>
                                <th>Quantity</th>
                                <th id="actionsHeader">Actions</th>
                                </tr>
                            </thead>

                            <tbody id="tableBody"></tbody>

                        </table>
                    </div>

                    <!-- Pagination Controls -->
                    <div class="d-flex justify-content-between align-items-center mt-3">
                        <button id="prevBtn" class="btn btn-secondary btn-sm px-3" disabled>Previous</button> 
                        <span id="pageInfo" class="text-muted small fw-bold">Page 1</span>
                        <button id="nextBtn" class="btn btn-secondary btn-sm px-3">Next</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="text-center py-4 mt-5 border-top border-light border-opacity-10">
        <div class="text-white opacity-75 small mb-1">
            Powered by <strong class="text-white">FastAPI</strong> & <strong class="text-white">Bootstrap</strong>
        </div>
        <div class="text-white opacity-50 small">
            &copy; 2026 Shantanu Deshmukh
        </div>
    </footer>

    <!-- Modal -->
    <div id="modalOverlay" class="overlay">
        <div class="custom-modal">   
            <form id="editProductForm">
                <h4 class="mb-3 text-center">Edit Product</h4>

                <input type="hidden" id="idField" /> <br>
        
                <div class="mb-2"> 
                    <label class="form-label">Product Name <span class="text-danger">*</span></label>
                    <input type="text" id="editName" class="form-control" required>  
                </div>
        
                <div class="mb-2">
                    <label class="form-label">Description <span class="text-muted fw-normal small">(Optional)</span></label>
                    <textarea id="editDesc" class="form-control"></textarea> 
                </div>
        
                <div class="mb-2">
                    <label class="form-label">Price <span class="text-danger">*</span></label>
                    <input type="number" id="editPrice" class="form-control" min="0.01" step="0.01" required>
                </div>
        
                <div class="mb-3">
                    <label class="form-label">Quantity <span class="text-danger">*</span></label>
                    <input type="number" id="editQty" class="form-control" min="0" required>
                </div>
        
                <div class="d-flex justify-content-between">
                    <button type="submit" id="updateBtn" class="btn btn-primary w-50 me-2">Update</button>
                    <button type="button" class="btn btn-secondary w-50" onclick="closeModal()">Cancel</button>
                </div>  
            </form>
        </div>
    </div>

    <!-- Profile Modal -->
    <div id="profileModalOverlay" class="overlay">
        <div class="custom-modal">
            <h4 class="mb-4 text-center">My Profile</h4>
            <div class="mb-3">
                <label class="form-label text-muted small mb-0">Name</label>
                <div id="profileName" class="fw-bold fs-5">Loading...</div>
            </div>
            <div class="mb-3">
                <label class="form-label text-muted small mb-0">Username</label>
                <div id="profileUsername" class="fw-medium">Loading...</div>
            </div>
            <div class="mb-3">
                <label class="form-label text-muted small mb-0">Email</label>
                <div id="profileEmail" class="fw-medium">Loading...</div>
            </div>
            <div class="mb-4">
                <label class="form-label text-muted small mb-0">Role</label>
                <div><span id="profileRole" class="badge bg-secondary">Loading...</span></div>
            </div>
            <div class="d-flex justify-content-center mt-2">
                <button type="button" class="btn btn-secondary w-100" onclick="closeProfileModal()">Close</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <!-- <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 9999"> -->
    <div class="position-fixed top-0 start-50 translate-middle-x p-3" style="z-index: 9999">
        <div id="toastBox" class="toast align-items-center text-bg-danger border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body" id="toastMessage">
                    Error message
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
