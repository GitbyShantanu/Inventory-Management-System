<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Users</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📦</text></svg>">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
    <script>
        const theme = localStorage.getItem("theme") || "light";
        document.documentElement.setAttribute("data-bs-theme", theme);
        
        if (!localStorage.getItem("token") || localStorage.getItem("role") !== "admin") {
            window.location.replace("index.html");
        }
    </script>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg glass-nav shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand brand-title" href="index.html">📦 Inventory Manager</a>
            
            <button class="navbar-toggler shadow-none border-0" type="button" data-bs-toggle="collapse" data-bs-target="#dashboardNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="dashboardNav">
                <ul class="navbar-nav ms-lg-4 me-auto fw-medium">
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                    <li class="nav-item"><a class="nav-link active fw-bold" href="admin.html"><i class="bi bi-people-fill"></i> Users</a></li>
                </ul>

                <div class="d-flex align-items-center mt-3 mt-lg-0">
                    <button id="themeToggle" class="btn btn-outline-light border-0 shadow-none" title="Toggle Theme">
                        <i id="themeIcon" class="bi bi-moon-fill fs-5"></i>
                    </button>
                    <button id="logoutBtn" class="btn btn-danger btn-sm ms-3 fw-bold shadow-sm">
                        <i class="bi bi-box-arrow-right"></i> Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div class="row mt-4">
            <div class="col-md-12">
                <div class="card p-4 shadow-sm border-0 glass-card">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h4 class="mb-0 fw-bold"><i class="bi bi-people-fill me-2"></i>User Management</h4>
                    </div>

                    <div class="table-container overflow-auto" style="max-height: 500px;">
                        <table class="table table-striped table-hover mt-2 align-middle">
                            <thead class="table-dark position-sticky top-0" style="z-index: 1;">
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Username</th>
                                    <th>Email</th>
                                    <th>Role</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="usersTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="position-fixed top-0 start-50 translate-middle-x p-3" style="z-index: 9999">
        <div id="toastBox" class="toast align-items-center text-bg-danger border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body" id="toastMessage">Error message</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="admin.js"></script>
</body>
</html>
