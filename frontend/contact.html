<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Inventory Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg glass-nav shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand brand-title" href="index.html">📦 Inventory Manager</a>
            <button class="navbar-toggler shadow-none border-0" type="button" data-bs-toggle="collapse" data-bs-target="#dashboardNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="dashboardNav">
                <ul class="navbar-nav ms-lg-4 me-auto fw-medium">
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link active fw-bold" href="contact.html">Contact</a></li>
                    <li class="nav-item d-none" id="adminUsersLink"><a class="nav-link fw-bold" href="admin.html"><i class="bi bi-people-fill"></i> Users</a></li>
                </ul>
                <div class="d-flex align-items-center mt-3 mt-lg-0">
                    <a href="https://github.com/GitbyShantanu/Inventory-Management-System" target="_blank" class="btn btn-outline-light border-0 shadow-none me-2" title="View Source Code">
                        <i class="bi bi-github fs-5"></i> 
                    </a>
                    <button id="themeToggle" class="btn btn-outline-light border-0 shadow-none" title="Toggle Theme">
                        <i id="themeIcon" class="bi bi-moon-fill fs-5"></i>
                    </button>
                    <button id="logoutBtn" class="btn btn-danger btn-sm ms-3 fw-bold shadow-sm">
                        <i class="bi bi-box-arrow-right"></i> Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container py-5 min-vh-100">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card p-4 p-md-5 shadow-lg border-0 text-center" style="border-radius: 1.5rem; background-color: rgba(var(--bs-body-bg-rgb), 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);">
                    <div class="mb-4">
                        <i class="bi bi-envelope-paper opacity-50" style="font-size: 2.5rem;"></i>
                        <h3 class="fw-bold mt-3" style="letter-spacing: 0.5px;">Get In Touch</h3>
                        <p class="opacity-75 small mt-2">Have questions or want to collaborate?</p>
                    </div>
                    
                    <div class="d-grid gap-3 mt-2">
                        <a href="mailto:shantanu.deshmukh@example.com" class="btn btn-outline-secondary py-2 d-flex align-items-center justify-content-center fw-medium border-secondary-subtle rounded-pill hover-lift">
                            <i class="bi bi-envelope me-2"></i> Email Me
                        </a>
                        <a href="http://www.linkedin.com/in/shantanu-deshmukh-18482322b" target="_blank" class="btn btn-outline-secondary py-2 d-flex align-items-center justify-content-center fw-medium border-secondary-subtle rounded-pill hover-lift">
                            <i class="bi bi-linkedin me-2"></i> LinkedIn
                        </a>
                        <a href="https://github.com/GitbyShantanu" target="_blank" class="btn btn-outline-secondary py-2 d-flex align-items-center justify-content-center fw-medium border-secondary-subtle rounded-pill hover-lift">
                            <i class="bi bi-github me-2"></i> GitHub
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="text-center py-4 border-top border-light border-opacity-10">
        <div class="text-white opacity-75 small mb-1">
            Powered by <strong class="text-white">FastAPI</strong> & <strong class="text-white">Bootstrap</strong>
        </div>
        <div class="text-white opacity-50 small">
            &copy; 2026 Shantanu Deshmukh
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Auth Bouncer
        if (!localStorage.getItem("token")) window.location.href = "login.html";
        
        // UI Role Enforcement
        if (localStorage.getItem("role") === "admin") {
            document.getElementById("adminUsersLink").classList.remove("d-none");
        }

        // Logout
        document.getElementById("logoutBtn").addEventListener("click", () => {
            localStorage.removeItem("token");
            localStorage.removeItem("role");
            window.location.href = "login.html";
        });

        // Theme logic
        const themeToggle = document.getElementById("themeToggle");
        const themeIcon = document.getElementById("themeIcon");
        function setTheme(theme) {
            document.documentElement.setAttribute("data-bs-theme", theme);
            localStorage.setItem("theme", theme);
            themeIcon.className = theme === "dark" ? "bi bi-sun-fill fs-5" : "bi bi-moon-fill fs-5";
        }
        setTheme(localStorage.getItem("theme") || "light");
        themeToggle.addEventListener("click", () => {
            const newTheme = document.documentElement.getAttribute("data-bs-theme") === "dark" ? "light" : "dark";
            themeIcon.classList.add("rotate-effect");
            setTimeout(() => { setTheme(newTheme); themeIcon.classList.remove("rotate-effect"); }, 150);
        });
    </script>
</body>
</html>
